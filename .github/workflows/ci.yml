name: Go CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: bankuser
          POSTGRES_PASSWORD: bankuser_pass_2024
          POSTGRES_DB: bankapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: go mod download

      - name: Run database migrations
        env:
          PGPASSWORD: bankuser_pass_2024
        run: |
          psql -h localhost -U bankuser -d bankapi -f migrations/001_init.sql

      - name: Build
        run: go build -v ./...

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: bankuser
          DB_PASSWORD: bankuser_pass_2024
          DB_NAME: bankapi
          DB_SSLMODE: disable
          JWT_SECRET: test-secret
          HMAC_SECRET: test-hmac
          SERVER_PORT: 8080
          LOG_LEVEL: debug
        run: go test ./... -v

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m --go=1.25